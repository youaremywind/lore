name: Deploy LoreHub docs

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'docs/website/**'
      - '.github/workflows/lorehub-docs-deploy.yml'

jobs:
  trigger-lorehub:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger LoreHub Cloudflare Pages deploy
        env:
          CLOUDFLARE_DEPLOY_HOOK: ${{ secrets.LOREHUB_CLOUDFLARE_DEPLOY_HOOK }}
        run: |
          if [ -z "$CLOUDFLARE_DEPLOY_HOOK" ]; then
            echo "Missing secret: LOREHUB_CLOUDFLARE_DEPLOY_HOOK"
            exit 1
          fi

          curl -fsS -X POST "$CLOUDFLARE_DEPLOY_HOOK"
